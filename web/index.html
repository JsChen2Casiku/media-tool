<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>media-tool</title>
  <link rel="stylesheet" href="/web/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header card">
      <div class="header-copy">
        <p class="eyebrow">MEDIA TOOL</p>
        <h1>短视频解析与异步转写</h1>
        <p class="header-description">解析媒体信息，提交异步转写任务，轮询查看结果，并按需预览或下载单项资源。</p>
      </div>
      <div class="header-stats">
        <article class="stat-chip">
          <span class="stat-label">服务状态</span>
          <strong id="health-status">检测中</strong>
          <small id="health-hint">正在检查接口可用性</small>
        </article>
        <article class="stat-chip">
          <span class="stat-label">当前任务</span>
          <strong id="job-status">空闲</strong>
          <small id="job-hint">尚未创建转写任务</small>
        </article>
      </div>
    </header>

    <main class="dashboard">
      <section class="card form-card">
        <div class="section-head">
          <div>
            <p class="eyebrow section-eyebrow">输入</p>
            <h2>任务参数</h2>
          </div>
          <button id="fill-demo" class="button button-secondary" type="button">填充示例</button>
        </div>

        <label class="field-label" for="media-text">分享文案或链接</label>
        <textarea
          id="media-text"
          class="field-control field-textarea"
          placeholder="粘贴抖音等短视频平台的分享文案或原始链接"
        ></textarea>

        <div class="field-grid">
          <label class="field-group field-span-2">
            <span class="field-label">Whisper ASR 服务地址</span>
            <input
              id="transcription-base-url"
              class="field-control"
              type="text"
              placeholder="http://127.0.0.1:9000"
            >
          </label>
          <label class="field-group">
            <span class="field-label">转写任务</span>
            <select id="transcription-task" class="field-control">
              <option value="transcribe">transcribe</option>
              <option value="translate">translate</option>
            </select>
          </label>
          <label class="field-group">
            <span class="field-label">语言代码</span>
            <input id="transcription-language" class="field-control" type="text" placeholder="zh">
          </label>
          <label class="field-group">
            <span class="field-label">转写超时</span>
            <input id="transcription-timeout" class="field-control" type="number" min="30" step="10" placeholder="300">
          </label>
        </div>

        <div class="toggle-grid">
          <label class="toggle-item">
            <input id="save-transcript" type="checkbox" checked>
            <span>保存 transcript.md</span>
          </label>
          <label class="toggle-item">
            <input id="transcription-encode" type="checkbox" checked>
            <span>转写前重编码</span>
          </label>
          <label class="toggle-item">
            <input id="transcription-word-timestamps" type="checkbox">
            <span>逐词时间戳</span>
          </label>
          <label class="toggle-item">
            <input id="transcription-vad-filter" type="checkbox">
            <span>静音过滤</span>
          </label>
        </div>

        <div class="action-row">
          <button id="parse-action" class="button button-primary" type="button">解析链接</button>
          <button id="extract-action" class="button button-accent" type="button">创建转写任务</button>
          <button id="clear-results" class="button button-secondary" type="button">清空结果</button>
        </div>
      </section>

      <section class="card side-card">
        <div class="section-head">
          <div>
            <p class="eyebrow section-eyebrow">状态</p>
            <h2>执行反馈</h2>
          </div>
        </div>

        <article id="status-card" class="status-panel status-idle" aria-live="polite">
          <strong id="status-title">等待操作</strong>
          <p id="status-message">先解析媒体信息，再创建异步转写任务。</p>
        </article>

        <div class="subsection-head">
          <h3>任务日志</h3>
          <button id="copy-log" class="button button-secondary button-small" type="button">复制日志</button>
        </div>
        <pre id="log-output" class="log-box">暂无任务日志</pre>

        <div class="subsection-head info-head">
          <h3>媒体信息</h3>
        </div>
        <div id="media-info" class="info-grid info-empty">
          <p>暂无媒体信息</p>
        </div>
      </section>

      <section class="card preview-card">
        <div class="section-head">
          <div>
            <p class="eyebrow section-eyebrow">预览</p>
            <h2>媒体预览与单项下载</h2>
          </div>
        </div>
        <div id="preview-grid" class="preview-root preview-empty">
          <p>解析完成后，这里会显示视频、音频、封面和图集预览。</p>
        </div>
      </section>

      <section class="card transcript-card">
        <div class="section-head">
          <div>
            <p class="eyebrow section-eyebrow">文案</p>
            <h2>转写输出</h2>
          </div>
          <button id="copy-transcript" class="button button-secondary" type="button">复制文案</button>
        </div>
        <pre id="transcript-output" class="transcript-box">暂无转写内容</pre>
      </section>
    </main>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
