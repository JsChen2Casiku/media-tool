<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>media-tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Fira+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/web/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-main">
        <span class="brand-pill">MEDIA TOOL</span>
        <div>
          <h1>短视频解析、预览与异步转写</h1>
          <p>提交转写任务后后台执行，前端轮询结果，避免长请求超时。</p>
        </div>
      </div>
      <div class="topbar-side">
        <article class="metric-card">
          <span class="metric-label">服务状态</span>
          <strong id="health-status">检测中</strong>
          <small id="health-hint">正在检查接口健康状态</small>
        </article>
        <article class="metric-card">
          <span class="metric-label">当前任务</span>
          <strong id="job-status">空闲</strong>
          <small id="job-hint">尚未创建转写任务</small>
        </article>
      </div>
    </header>

    <main class="workspace-grid">
      <section class="panel control-panel">
        <div class="panel-head">
          <div>
            <p class="section-tag">控制台</p>
            <h2>任务参数</h2>
          </div>
          <button class="ghost-button" id="fill-demo" type="button">填充示例</button>
        </div>

        <label class="field-label" for="media-text">分享文案或链接</label>
        <textarea id="media-text" class="text-input textarea-input" placeholder="粘贴短视频平台的分享文案或原始链接"></textarea>

        <div class="config-grid">
          <div class="full-span">
            <label class="field-label" for="transcription-base-url">Whisper ASR 服务地址</label>
            <input id="transcription-base-url" class="text-input" type="text" placeholder="http://127.0.0.1:9000">
          </div>
          <div>
            <label class="field-label" for="transcription-task">转写任务</label>
            <select id="transcription-task" class="text-input">
              <option value="transcribe">transcribe</option>
              <option value="translate">translate</option>
            </select>
          </div>
          <div>
            <label class="field-label" for="transcription-language">语言代码</label>
            <input id="transcription-language" class="text-input" type="text" placeholder="zh">
          </div>
          <div class="full-span">
            <label class="field-label" for="transcription-timeout">转写超时（秒）</label>
            <input id="transcription-timeout" class="text-input" type="number" min="30" step="10" placeholder="300">
          </div>
        </div>

        <div class="toggle-grid">
          <label class="toggle-card">
            <input type="checkbox" id="save-transcript" checked>
            <span>保存 transcript.md</span>
          </label>
          <label class="toggle-card">
            <input type="checkbox" id="transcription-encode" checked>
            <span>转写前重编码</span>
          </label>
          <label class="toggle-card">
            <input type="checkbox" id="transcription-word-timestamps">
            <span>逐词时间戳</span>
          </label>
          <label class="toggle-card">
            <input type="checkbox" id="transcription-vad-filter">
            <span>静音过滤</span>
          </label>
        </div>

        <div class="action-row">
          <button class="primary-button" id="parse-action" type="button">解析链接</button>
          <button class="highlight-button" id="extract-action" type="button">开始转写</button>
          <button class="ghost-button" id="clear-results" type="button">清空结果</button>
        </div>
      </section>

      <aside class="panel side-panel">
        <div class="panel-head">
          <div>
            <p class="section-tag">状态</p>
            <h2>执行反馈</h2>
          </div>
          <button class="ghost-button" id="copy-log" type="button">复制日志</button>
        </div>

        <div id="status-card" class="status-card idle" role="alert" aria-live="polite">
          <strong id="status-title">等待操作</strong>
          <p id="status-message">先解析媒体信息，再发起异步转写任务。</p>
        </div>

        <pre id="log-output" class="log-box">暂无任务日志</pre>

        <div class="panel-head compact-head">
          <div>
            <p class="section-tag">媒体</p>
            <h2>媒体信息</h2>
          </div>
        </div>
        <div id="media-info" class="meta-grid empty-state">
          <p>暂无媒体信息</p>
        </div>
      </aside>

      <section class="panel preview-panel">
        <div class="panel-head">
          <div>
            <p class="section-tag">预览</p>
            <h2>媒体预览与单项下载</h2>
          </div>
        </div>
        <div id="preview-grid" class="preview-area empty-state">
          <p>解析完成后，这里会展示视频、音频、封面和图集预览。</p>
        </div>
      </section>

      <section class="panel transcript-panel">
        <div class="panel-head">
          <div>
            <p class="section-tag">文案</p>
            <h2>转写输出</h2>
          </div>
          <button class="ghost-button" id="copy-transcript" type="button">复制文案</button>
        </div>
        <pre id="transcript-output" class="transcript-box">暂无转写内容</pre>
      </section>
    </main>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
