services:
  media-tool:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${MEDIA_TOOL_PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${MEDIA_TOOL_PIP_EXTRA_INDEX_URL:-}
    container_name: media-tool
    restart: unless-stopped
    depends_on:
      - whisper-asr
    ports:
      - "8000:8051"
    environment:
      MEDIA_TOOL_AUTH_USERNAME: ${MEDIA_TOOL_AUTH_USERNAME:-admin}
      MEDIA_TOOL_AUTH_PASSWORD: ${MEDIA_TOOL_AUTH_PASSWORD:-admin123}
      MEDIA_TOOL_AUTH_COOKIE_SECURE: ${MEDIA_TOOL_AUTH_COOKIE_SECURE:-false}
      MEDIA_TOOL_AUTH_SESSION_TTL: ${MEDIA_TOOL_AUTH_SESSION_TTL:-604800}
      MEDIA_TOOL_AUTH_CONFIG_PATH: ${MEDIA_TOOL_AUTH_CONFIG_PATH:-/app/runtime/storage/auth.env}
      MEDIA_TOOL_STORAGE_ROOT: /app/runtime/storage
      MEDIA_TOOL_LOG_ROOT: /app/runtime/logs
      MEDIA_TOOL_REQUEST_TIMEOUT: ${MEDIA_TOOL_REQUEST_TIMEOUT:-30}
      MEDIA_TOOL_TRANSCRIPTION_BASE_URL: ${MEDIA_TOOL_TRANSCRIPTION_BASE_URL:-http://whisper-asr:9000}
      MEDIA_TOOL_TRANSCRIPTION_TASK: ${MEDIA_TOOL_TRANSCRIPTION_TASK:-transcribe}
      MEDIA_TOOL_TRANSCRIPTION_LANGUAGE: ${MEDIA_TOOL_TRANSCRIPTION_LANGUAGE:-zh}
      MEDIA_TOOL_TRANSCRIPTION_TIMEOUT: ${MEDIA_TOOL_TRANSCRIPTION_TIMEOUT:-300}
      MEDIA_TOOL_TRANSCRIPTION_ENCODE: ${MEDIA_TOOL_TRANSCRIPTION_ENCODE:-true}
      MEDIA_TOOL_TRANSCRIPTION_WORD_TIMESTAMPS: ${MEDIA_TOOL_TRANSCRIPTION_WORD_TIMESTAMPS:-false}
      MEDIA_TOOL_TRANSCRIPTION_VAD_FILTER: ${MEDIA_TOOL_TRANSCRIPTION_VAD_FILTER:-false}
      MEDIA_TOOL_LLM_API_BASE: ${MEDIA_TOOL_LLM_API_BASE:-https://api.openai.com/v1}
      MEDIA_TOOL_LLM_API_KEY: ${MEDIA_TOOL_LLM_API_KEY:-}
      MEDIA_TOOL_LLM_MODEL: ${MEDIA_TOOL_LLM_MODEL:-gpt-5.4}
      MEDIA_TOOL_LLM_TIMEOUT: ${MEDIA_TOOL_LLM_TIMEOUT:-90}
      MAX_CACHE_SIZE_MB: ${MAX_CACHE_SIZE_MB:-15}
    volumes:
      - ./media_tool_storage:/app/runtime/storage
      - ./media_tool_logs:/app/runtime/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8051/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  whisper-asr:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-asr
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      ASR_ENGINE: faster_whisper
      ASR_MODEL: small
      ASR_DEVICE: cpu
      ASR_MODEL_PATH: /data/whisper
    volumes:
      - ./whisper-cache:/data/whisper
