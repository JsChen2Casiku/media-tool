services:
  media-tool:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${MEDIA_TOOL_PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${MEDIA_TOOL_PIP_EXTRA_INDEX_URL:-}
    container_name: media-tool
    restart: unless-stopped
    ports:
      - "8000:8051"
    environment:
      MEDIA_TOOL_OPENTYPELESS_MODEL: ${MEDIA_TOOL_OPENTYPELESS_MODEL:-doubao-asr}
      MEDIA_TOOL_OPENTYPELESS_CREDENTIAL_PATH: ${MEDIA_TOOL_OPENTYPELESS_CREDENTIAL_PATH:-/app/runtime/storage/opentypeless/credentials.json}
      MEDIA_TOOL_OPENTYPELESS_DEVICE_ID: ${MEDIA_TOOL_OPENTYPELESS_DEVICE_ID:-}
      MEDIA_TOOL_OPENTYPELESS_TOKEN: ${MEDIA_TOOL_OPENTYPELESS_TOKEN:-}
      MEDIA_TOOL_OPENTYPELESS_DEFAULT_BACKEND: ${MEDIA_TOOL_OPENTYPELESS_DEFAULT_BACKEND:-ime}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_MODE: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_MODE:-flash}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_APP_KEY: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_APP_KEY:-}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_ACCESS_KEY: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_ACCESS_KEY:-}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_STANDARD_SUBMIT_ENDPOINT: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_STANDARD_SUBMIT_ENDPOINT:-https://openspeech.bytedance.com/api/v3/auc/bigmodel/submit}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_STANDARD_QUERY_ENDPOINT: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_STANDARD_QUERY_ENDPOINT:-https://openspeech.bytedance.com/api/v3/auc/bigmodel/query}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_FLASH_ENDPOINT: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_FLASH_ENDPOINT:-https://openspeech.bytedance.com/api/v3/auc/bigmodel/recognize/flash}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_STANDARD_RESOURCE_ID: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_STANDARD_RESOURCE_ID:-volc.seedasr.auc}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_FLASH_RESOURCE_ID: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_FLASH_RESOURCE_ID:-volc.bigasr.auc_turbo}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_MODEL_NAME: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_MODEL_NAME:-bigmodel}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_UID: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_UID:-opentypeless}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_TIMEOUT_SEC: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_TIMEOUT_SEC:-120}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_QUERY_INTERVAL_SEC: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_QUERY_INTERVAL_SEC:-1.0}
      MEDIA_TOOL_OPENTYPELESS_OFFICIAL_QUERY_TIMEOUT_SEC: ${MEDIA_TOOL_OPENTYPELESS_OFFICIAL_QUERY_TIMEOUT_SEC:-300}
      MEDIA_TOOL_STORAGE_ROOT: /app/runtime/storage
      MEDIA_TOOL_LOG_ROOT: /app/runtime/logs
      MEDIA_TOOL_REQUEST_TIMEOUT: ${MEDIA_TOOL_REQUEST_TIMEOUT:-30}
      MAX_CACHE_SIZE_MB: ${MAX_CACHE_SIZE_MB:-15}
    volumes:
      - ./media_tool_storage:/app/runtime/storage
      - ./media_tool_logs:/app/runtime/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8051/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
